// ── Write to localStorage and redirect ───────────────────────────────────────
(function() {
  try {
    // ── Data-loss guard (hardened) ───────────────────────────────────────────
    // The demo NEVER clears storage and NEVER overwrites a real record. It runs
    // only on an empty device or one that already holds this same demo dataset.
    // Any sign of a real record — an encrypted vault, a non-demo PIN, or real
    // health data — and the demo refuses outright. This is the fix for the
    // incident where a cached older demo wiped a live record.
    // "mi_is_demo" is the unambiguous demo marker — safer than the PIN hash,
    // which a real user could legitimately share (e.g. a real PIN of 1234).
    const isDemoDevice = localStorage.getItem("mi_is_demo") === "1";
    const HEALTH_KEYS = ["mi_meds_full", "mi_labs", "mi_conditions", "mi_profile_personal", "mi_documents", "mi_records"];
    const hasHealthData = HEALTH_KEYS.some(k => localStorage.getItem(k) !== null);
    if (localStorage.getItem("mi_vault") !== null || (hasHealthData && !isDemoDevice)) {
      document.querySelector(".spinner").style.display = "none";
      document.querySelector(".msg").innerHTML =
        "You already have a record on this device.<br/>The demo won't load, so your data is untouched.";
      document.querySelector(".pin").innerHTML = '<a href="../" style="color:#7eb8d8">Open my record →</a>';
      return;
    }
    // Safe: empty device or an existing demo. Write demo data WITHOUT clearing —
    // there is nothing here to protect, and clear() is never used again.
    localStorage.setItem("mi_is_demo", "1");
    localStorage.setItem("mi_auth_hash", DEMO_PIN_HASH);
    Object.entries(DEMO).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
    // Relative redirect: from /app/demo/ (production) → /app/; from /demo/ (dev) → /.
    setTimeout(() => { window.location.href = "/app/"; }, 1800);
  } catch(e) {
    document.querySelector(".msg").textContent = "Error loading demo: " + e.message;
  }
})();
</script>
