<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy (S-03 / PG-05). GitHub Pages cannot set response
         headers, so this meta tag is the enforcement point. Allowlisted origins,
         each verified in use: accounts.google.com (Google Identity script +
         iframes), fonts.googleapis.com / fonts.gstatic.com (Google Fonts),
         *.googleusercontent.com (Google profile photo), www.googleapis.com
         (Drive + Calendar), insina-health.onrender.com (AI proxy),
         api.anthropic.com (BYO-key fallback path — remove when A-02 lands),
         clinicaltables.nlm.nih.gov (ICD-10 lookup). style-src 'unsafe-inline'
         is accepted debt: inline styles are pervasive in the codebase.
         Stripped during `npm run dev` only (see vite.config.js) because the
         React dev plugin injects an inline refresh preamble. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com; connect-src 'self' https://insina-health.onrender.com https://www.googleapis.com https://accounts.google.com https://api.anthropic.com https://clinicaltables.nlm.nih.gov; frame-src https://accounts.google.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Insina Health" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#07090f" />

    <!-- UI-8: fonts loaded ONCE here — previously every tab's <style> block
         re-declared this same @import (16 files). CSP above already allows
         fonts.googleapis.com / fonts.gstatic.com. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/app/favicon.png" />
    <link rel="apple-touch-icon" href="/app/favicon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/app/manifest.json" />

    <title>Insina Health</title>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Companion mode manifest swap + Service Worker registration. External
         files (not inline) so script-src can stay 'self' with no
         'unsafe-inline' (S-03 / PG-05). Same execution order as the previous
         inline versions: the manifest swap runs synchronously in head. -->
    <script src="/app/companion-manifest-init.js"></script>
    <script src="/app/register-sw.js"></script>
    <script type="module" crossorigin src="/app/assets/main-DQfZXWWf.js"></script>
    <link rel="stylesheet" crossorigin href="/app/assets/main-DBQYQzwv.css">
  </head>
  <body style="background:#07090f; margin:0;">
    <div id="root"></div>
  </body>
</html>
